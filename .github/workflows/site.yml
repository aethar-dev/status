name: Static Site CI
on:
  schedule:
    - cron: "0 1 * * *"
  repository_dispatch:
  workflow_dispatch:
permissions:
  contents: write
  pages: write
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Run Upptime
        uses: upptime/status-page@v1.17.0
        with:
          command: "site"
        env:
          GH_PAT: ${{ secrets.GH_PAT || github.token }}
